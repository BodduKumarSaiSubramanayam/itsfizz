name: Aetheria CI/CD Pipeline

# Demonstrating Git & GitHub Best Practices alongside Vercel/AWS Deployments
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Configure Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build React Application (Code Splitting Check)
        working-directory: ./frontend
        run: npm run build

      - name: Security Audit (OWASP)
        working-directory: ./backend
        run: npm audit --audit-level=high

  # Shows the Vercel & AWS/Render deployment phase
  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend to Vercel (Production)
        run: echo "Vercel CLI deploys the 'dist' folder generated by Vite."
        
      - name: Deploy Backend to AWS/Render
        run: echo "Render/AWS pulls the latest commit from GitHub automatically based on render.yaml blueprint."
